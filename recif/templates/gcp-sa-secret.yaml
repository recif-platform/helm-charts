{{- /*
  GCP Service Account secrets — created from a single base64-encoded SA key.
  Produces two Secrets:
    1. gcp-adc          (agent namespace) — mounted by agent pods via the operator
    2. recif-platform-gcp-sa (release namespace) — mounted by the API/Marée pod
*/ -}}
{{- if and (eq (include "recif.secretsProvider" .) "inline") .Values.llm.gcp.project .Values.llm.gcp.serviceAccountKeyBase64 }}
apiVersion: v1
kind: Secret
metadata:
  name: gcp-adc
  namespace: {{ .Values.global.teamNamespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: gcp-credentials
type: Opaque
data:
  adc.json: {{ .Values.llm.gcp.serviceAccountKeyBase64 | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: recif-platform-gcp-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: gcp-credentials
type: Opaque
data:
  credentials.json: {{ .Values.llm.gcp.serviceAccountKeyBase64 | quote }}
{{- end }}
