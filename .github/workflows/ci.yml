name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint
        run: helm lint helm/recif/
      - name: Template (default values)
        run: helm template test helm/recif/
      - name: Template (external secrets)
        run: |
          helm template test helm/recif/ \
            --set secrets.provider=external \
            --set secrets.external.storeName=test \
            --set secrets.external.keys.agentEnv=test/env \
            --set secrets.external.keys.gcpServiceAccount=test/gcp
      - name: Template (no secrets)
        run: helm template test helm/recif/ --set secrets.provider=none
