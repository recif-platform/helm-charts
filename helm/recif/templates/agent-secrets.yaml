{{- /*
  agent-env: LLM API keys injected into every agent namespace.
  Agents load this via envFrom secretRef (optional: true).

  Only created when secrets.provider == "inline" (default).
  When "external", ESO creates this Secret via ExternalSecret CRD.
  When "none", the user manages it manually.
*/ -}}
{{- if eq (include "recif.secretsProvider" .) "inline" }}
{{- $hasAnyKey := or .Values.llm.googleApiKey .Values.llm.openaiApiKey .Values.llm.anthropicApiKey .Values.llm.awsAccessKeyId -}}
{{- if $hasAnyKey }}
apiVersion: v1
kind: Secret
metadata:
  name: agent-env
  namespace: {{ .Values.global.teamNamespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: agent-secrets
type: Opaque
stringData:
  {{- if .Values.llm.googleApiKey }}
  GOOGLE_API_KEY: {{ .Values.llm.googleApiKey | quote }}
  GOOGLE_AI_API_KEY: {{ .Values.llm.googleApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.llm.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.llm.awsSecretAccessKey | quote }}
  AWS_REGION: {{ .Values.llm.awsRegion | default "us-east-1" | quote }}
  {{- end }}
{{- end }}
---
{{- /* GCP project + location for Vertex AI — injected into operator */ -}}
{{- if .Values.llm.gcp.project }}
apiVersion: v1
kind: Secret
metadata:
  name: gcp-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: recif
type: Opaque
stringData:
  GOOGLE_CLOUD_PROJECT: {{ .Values.llm.gcp.project | quote }}
  GOOGLE_CLOUD_LOCATION: {{ .Values.llm.gcp.location | default "us-central1" | quote }}
{{- end }}
{{- end }}
