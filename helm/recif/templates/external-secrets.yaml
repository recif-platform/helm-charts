{{- /*
  External Secrets — when secrets.provider == "external", these ExternalSecret
  CRDs tell ESO to sync secrets from the configured backend (Vault, GCP SM,
  AWS SM, etc.) into the K8s Secrets that agents and the API expect.

  Prerequisite: External Secrets Operator must be installed.
  https://external-secrets.io/latest/introduction/getting-started/
*/ -}}
{{- if eq (include "recif.secretsProvider" .) "external" }}
{{- $store := .Values.secrets.external }}
{{- $refresh := $store.refreshInterval }}
{{- $storeName := $store.storeName }}
{{- $storeKind := $store.storeKind }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agent-env
  namespace: {{ .Values.global.teamNamespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: agent-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $store.keys.agentEnv }}
{{- if $store.keys.gcpServiceAccount }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gcp-adc
  namespace: {{ .Values.global.teamNamespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: gcp-adc
    creationPolicy: Owner
  data:
    - secretKey: adc.json
      remoteRef:
        key: {{ $store.keys.gcpServiceAccount }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: recif-platform-gcp-sa
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: recif
    app.kubernetes.io/component: external-secrets
spec:
  refreshInterval: {{ $refresh }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: recif-platform-gcp-sa
    creationPolicy: Owner
  data:
    - secretKey: credentials.json
      remoteRef:
        key: {{ $store.keys.gcpServiceAccount }}
{{- end }}
{{- end }}
