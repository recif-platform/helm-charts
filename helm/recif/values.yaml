# -- Global settings
global:
  imageTag: "latest"
  imagePullPolicy: IfNotPresent
  teamNamespace: "team-default"

# -- Recif API
api:
  replicas: 1
  image: ghcr.io/recif-platform/recif-api
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    AUTH_ENABLED: "false"
    LOG_LEVEL: "info"
    LOG_FORMAT: "json"
    ENV_PROFILE: "dev"

# -- Recif Operator
operator:
  replicas: 1
  image: ghcr.io/recif-platform/recif-operator
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Dashboard
dashboard:
  enabled: true
  replicas: 1
  image: ghcr.io/recif-platform/recif-dashboard
  port: 3000
  apiUrl: ""  # override to set NEXT_PUBLIC_API_URL at runtime (e.g. http://recif-api:8080)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- PostgreSQL
postgresql:
  enabled: true
  image: pgvector/pgvector:pg16
  storage: 10Gi
  port: 5432
  credentials:
    database: recif
    username: recif
    password: recif_dev  # override in prod!

# -- Corail (default agent image)
corail:
  image: ghcr.io/recif-platform/corail
  defaultModel: "ollama/qwen3.5:4b"

# -- Ollama (optional, for local models)
ollama:
  enabled: false  # Set true to run Ollama in-cluster. Most users connect to their own Ollama or cloud LLM.
  image: ollama/ollama:latest
  storage: 20Gi
  port: 11434
  gpu: false  # set true for GPU nodes
  models:
    - qwen3.5:4b
    - nomic-embed-text

# -- LLM Provider Credentials
# Set API keys for the LLM providers your agents will use.
# These are injected as a Secret into agent namespaces.
# At minimum, set ONE provider to get started.
llm:
  # Google AI (simplest — just an API key from https://aistudio.google.com)
  googleApiKey: ""
  # OpenAI
  openaiApiKey: ""
  # Anthropic
  anthropicApiKey: ""
  # AWS Bedrock
  awsRegion: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  # Google Cloud / Vertex AI (production — needs project + ADC credentials)
  gcp:
    project: ""           # e.g. "my-project-123"
    location: "us-central1"
    # For local dev: run `gcloud auth application-default login`
    # then the setup script creates the gcp-adc secret automatically.
    # For GKE: use Workload Identity instead (no secret needed).

# -- MLflow (eval-driven lifecycle)
mlflow:
  enabled: true
  image: python:3.13-slim   # MLflow installed at startup via pip
  storage: 10Gi
  port: 5000
  postgresql:
    password: mlflow_dev  # override in prod!

# -- Istio + Kiali (installed separately)
# Istio is NOT bundled in this chart due to complexity.
# To install Istio + Kiali for canary deployments, run:
#   ./deploy/scripts/setup-istio.sh
istio:
  enabled: false

# -- Ingress
ingress:
  enabled: false
  className: nginx
  host: recif.local
  tls: false
